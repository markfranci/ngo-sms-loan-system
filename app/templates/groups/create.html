{% extends 'base.html' %}
{% block title %}Create Group{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-text">
    <h2>Create New Group</h2>
    <p>Set up a new SME group segment.</p>
  </div>
  <div class="page-header-actions">
    <a href="{{ url_for('groups.index') }}" class="btn btn-ghost">
      <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Back
    </a>
  </div>
</div>

<div class="glass-card" style="max-width:640px;">
  <form method="POST" action="{{ url_for('groups.create') }}">
    <div class="form-group">
      <label for="name" class="form-label">Group Name *</label>
      <input type="text" id="name" name="name" required class="form-input" placeholder="e.g. Nairobi SME Cohort 1">
    </div>

    <div class="form-group">
      <label for="description" class="form-label">Description</label>
      <textarea id="description" name="description" rows="3" class="form-textarea" placeholder="Brief description of this group..."></textarea>
    </div>

    <div class="form-group">
      <label for="assigned_staff_id" class="form-label">Assign to Staff (Optional)</label>
      <select id="assigned_staff_id" name="assigned_staff_id" class="form-select">
        <option value="">-- Select Staff --</option>
        {% for staff in staff_members %}
        <option value="{{ staff.id }}">{{ staff.username if staff.username else staff.email }}</option>
        {% endfor %}
      </select>
      <span class="form-hint">Only Staff members can manage a group.</span>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" id="btn-submit-group">
        <i data-lucide="plus" style="width:16px;height:16px;"></i> Create Group
      </button>
      <a href="{{ url_for('groups.index') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
