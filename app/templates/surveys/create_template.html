{% extends 'base.html' %}
{% block title %}Create Survey{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-text">
    <h2>Create New Survey</h2>
    <p>Set up a new survey template to collect data from SME members.</p>
  </div>
  <div class="page-header-actions">
    <a href="{{ url_for('surveys.index') }}" class="btn btn-ghost">
      <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Back
    </a>
  </div>
</div>

<div class="glass-card" style="max-width:640px;">
  <form method="POST" action="{{ url_for('surveys.create') }}">
    <div class="form-group">
      <label for="title" class="form-label">Survey Title *</label>
      <input type="text" id="title" name="title" required class="form-input" placeholder="e.g. Business Assessment 2026">
    </div>

    <div class="form-group">
      <label for="description" class="form-label">Description / Purpose</label>
      <textarea id="description" name="description" rows="3" class="form-textarea" placeholder="Explain what answers this survey collects."></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" id="btn-save-survey">
        <i data-lucide="save" style="width:16px;height:16px;"></i> Save Survey Shell
      </button>
      <a href="{{ url_for('surveys.index') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
